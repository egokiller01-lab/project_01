<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | PLACHEM VINA</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-dark);
        }

        .error-code {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .error-title {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--white);
        }

        .error-description {
            max-width: 500px;
            margin-bottom: 3rem;
            color: var(--text-secondary);
        }

        .error-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--accent);
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: var(--transition);
        }

        .error-btn:hover {
            transform: translateY(-3px);
            background: var(--white);
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">요청하신 페이지를 찾을 수 없습니다.</h1>
        <p class="error-description">
            방문하시려는 페이지의 주소가 잘못되었거나,<br>
            페이지가 삭제 또는 이동되었을 수 있습니다.
        </p>
        <a href="index.html" class="error-btn">홈으로 돌아가기</a>
    </div>

</body>
</html>
